# Production museum runtime: public Minecraft server plus scripted in-game guide agents.
services:
  mc:
    image: itzg/minecraft-server:java21
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      TYPE: "VANILLA"
      VERSION: "1.21.4"
      EULA: "TRUE"
      MEMORY: "${MC_MEMORY:-6G}"
      MOTD: "SAM Minecraft Museum - AI agents building landmark worlds"
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-40}"
      SEED: "${MC_SEED:-sam-minecraft-museum-natural}"
      GENERATE_STRUCTURES: "false"
      MODE: "creative"
      FORCE_GAMEMODE: "TRUE"
      DIFFICULTY: "peaceful"
      PVP: "FALSE"
      ALLOW_FLIGHT: "TRUE"
      SPAWN_PROTECTION: "0"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "${RCON_PASSWORD:-sam-museum-change-me}"
    volumes:
      - museum-mc-data:/data

  museum-agents:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app/vendor/minecraft-mcp-server
    depends_on:
      - mc
    environment:
      MC_HOST: "mc"
      MC_PORT: "25565"
    volumes:
      - .:/app
    command: >
      sh -lc "npm ci --ignore-scripts --no-audit --no-fund >/tmp/museum-agents-npm.log 2>&1 ||
      npm install --ignore-scripts --no-audit --no-fund >/tmp/museum-agents-npm.log 2>&1;
      node scripts/museum-agents.mjs"

volumes:
  museum-mc-data:
