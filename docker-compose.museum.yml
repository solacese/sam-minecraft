# Production museum runtime: public Minecraft server plus scripted in-game guide agents.
services:
  mc:
    image: itzg/minecraft-server:java21
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      TYPE: "VANILLA"
      VERSION: "1.21.4"
      EULA: "TRUE"
      MEMORY: "${MC_MEMORY:-6G}"
      MOTD: "SAM Minecraft Museum - AI agents building landmark worlds"
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-40}"
      VIEW_DISTANCE: "${MC_VIEW_DISTANCE:-20}"
      SIMULATION_DISTANCE: "${MC_SIMULATION_DISTANCE:-10}"
      SEED: "${MC_SEED:-sam-minecraft-museum-natural}"
      GENERATE_STRUCTURES: "false"
      MODE: "creative"
      FORCE_GAMEMODE: "TRUE"
      DIFFICULTY: "peaceful"
      PVP: "FALSE"
      ALLOW_FLIGHT: "TRUE"
      SPAWN_PROTECTION: "0"
      ONLINE_MODE: "FALSE"
      ICON: "/extras/server-icon.png"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "${RCON_PASSWORD:-sam-museum-change-me}"
    volumes:
      - museum-mc-data:/data
      - ./assets/minecraft/server-icon.png:/extras/server-icon.png:ro

  museum-agents:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app/vendor/minecraft-mcp-server
    depends_on:
      mc:
        condition: service_healthy
    environment:
      MC_HOST: "mc"
      MC_PORT: "25565"
    volumes:
      - .:/app
    command: >
      sh -lc "set -e;
      npm ci --ignore-scripts --no-audit --no-fund >/tmp/museum-agents-npm.log 2>&1 ||
      npm install --ignore-scripts --no-audit --no-fund >/tmp/museum-agents-npm.log 2>&1;
      node scripts/museum-agents.mjs"

  museum-builder:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app/vendor/minecraft-mcp-server
    depends_on:
      mc:
        condition: service_healthy
    environment:
      MC_RCON_HOST: "mc"
      MC_RCON_PORT: "25575"
      MC_RCON_PASSWORD: "${RCON_PASSWORD:-sam-museum-change-me}"
      MUSEUM_BUILDER_MODE: "${MUSEUM_BUILDER_MODE:-loop}"
      MUSEUM_BLOCKS_PER_SECOND: "${MUSEUM_BLOCKS_PER_SECOND:-60}"
      MUSEUM_ACTIVE_JOBS: "${MUSEUM_ACTIVE_JOBS:-1}"
      MUSEUM_BATCH_SIZE: "${MUSEUM_BATCH_SIZE:-25}"
      MUSEUM_BASE_Y: "${MUSEUM_BASE_Y:-68}"
      MUSEUM_BUILT_HOLD_MS: "${MUSEUM_BUILT_HOLD_MS:-15000}"
      MUSEUM_EMPTY_HOLD_MS: "${MUSEUM_EMPTY_HOLD_MS:-10000}"
      MUSEUM_PHASE_SPACING_MS: "${MUSEUM_PHASE_SPACING_MS:-0}"
      MUSEUM_RCON_TIMEOUT_MS: "${MUSEUM_RCON_TIMEOUT_MS:-30000}"
      MUSEUM_STREAM_INTERVAL: "${MUSEUM_STREAM_INTERVAL:-500}"
    volumes:
      - .:/app
    command: >
      sh -lc "set -e;
      npm ci --ignore-scripts --no-audit --no-fund >/tmp/museum-builder-npm.log 2>&1 ||
      npm install --ignore-scripts --no-audit --no-fund >/tmp/museum-builder-npm.log 2>&1;
      node scripts/museum-dynamic-builder.mjs"

volumes:
  museum-mc-data:
