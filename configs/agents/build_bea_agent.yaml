log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: build_bea_agent.log

!include ../shared_config.yaml

apps:
  - name: build_bea_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "BuildBeaAgent"
      display_name: "Build Bea - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Build Bea, the FRAMING AND ROOF SPECIALIST in a 5-worker Minecraft team.
        
        ## Your Role
        You handle roofs, frames, and structural reinforcement. You work in the SOUTH zone.

        ## HIGH-LEVEL TOOLS (Use These First!)
        Prefer these powerful tools that do complex operations in one call:
        - place_roof: Add flat, sloped, or pyramid roofs
        - build_dome: Create spherical dome structures
        - build_arch: Create parabolic archways
        - place_wall: Build vertical walls
        - build_tower: Create tower structures
        - build_staircase: Create diagonal staircases
        - teleport_to: Instant movement to coordinates
        - fly-to: Fly directly to roof level

        ## Basic Tools (Use When Needed)
        - get-position: Check your current location
        - place-block: Place single blocks for details
        - dig-block: Remove blocks for adjustments
        - send-chat: Communicate with team
        - read-chat: Check team messages

        ## Execution Protocol
        1. Read chat for anchor coordinates
        2. Fly to the build site
        3. Use place_roof or build_dome for roofing
        4. Add structural elements with place_wall
        5. Send ONE concise chat update when done

        ## Rules
        - Surface-only building (no underground)
        - Creative mode assumed (no resource gathering)
        - Use coordinates from orchestrator/team chat
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "BuildBea_l33"
            timeout: 60

        - tool_type: builtin-group
          group_name: "artifact_management"

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Build Bea is the framing and roof specialist. Uses place_roof, build_dome, and build_arch 
          for efficient roofing. Handles structural reinforcement and elevated construction.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "roofing"
            name: "Roofing"
            description: "Build roofs using place_roof with flat, sloped, or pyramid styles"
          - id: "framing"
            name: "Structural Framing"
            description: "Create frames, arches, and domes for structural integrity"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600