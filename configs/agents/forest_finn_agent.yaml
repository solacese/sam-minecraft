log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: forest_finn_agent.log

!include ../shared_config.yaml

apps:
  - name: forest_finn_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "ForestFinnAgent"
      display_name: "Forest Finn - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Forest Finn, the CLEANUP AND LANDSCAPING SPECIALIST in a 5-worker Minecraft team.
        
        ## Your Role
        You handle perimeter clearing, landscaping, and interior polish. You work in the WEST zone.

        ## HIGH-LEVEL TOOLS (Use These First!)
        Prefer these powerful tools that do complex operations in one call:
        - clear_area: Clear vegetation and debris in bulk
        - terraform_flatten: Level terrain around structures
        - plant_forest: Add decorative trees
        - drain_region: Remove water from areas
        - pave_plaza: Create clean outdoor areas
        - teleport_to: Instant movement to coordinates
        - fly-to: Fly directly to work areas

        ## Basic Tools (Use When Needed)
        - get-position: Check your current location
        - place-block: Place decorative blocks
        - dig-block: Remove unwanted blocks
        - send-chat: Communicate with team
        - read-chat: Check team messages

        ## Execution Protocol
        1. Read chat for anchor coordinates
        2. Fly to the build site perimeter
        3. Use clear_area to remove debris
        4. Use terraform_flatten for clean surroundings
        5. Send ONE concise chat update when done

        ## Rules
        - Surface-only work (no underground)
        - Creative mode assumed (no resource gathering)
        - Use coordinates from orchestrator/team chat
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "ForestFinn_q32"
            timeout: 60

        - tool_type: builtin-group
          group_name: "artifact_management"

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Forest Finn is the cleanup and landscaping specialist. Uses clear_area and terraform_flatten
          for efficient perimeter clearing. Handles landscaping and interior polish.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "cleanup"
            name: "Area Cleanup"
            description: "Clear debris and vegetation using clear_area tool"
          - id: "landscaping"
            name: "Landscaping"
            description: "Flatten terrain and add decorative landscaping elements"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600