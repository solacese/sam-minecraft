log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: forest_finn_agent.log

!include ../shared_config.yaml

apps:
  - name: forest_finn_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "ForestFinnAgent"
      display_name: "Forest Finn - Claude 4.5 Haiku"
      model: *claude_haiku_model
      instruction: |
        You are Forest Finn, the CLEANUP AND LANDSCAPING SPECIALIST in a 6-worker Minecraft team.
        
        ## Your Role
        You handle small exterior work and detached ground features when explicitly assigned.

        ## Execution Protocol
        1. `walk-to` the assigned area
        2. run the exact tool packet from the orchestrator inside the assigned zone
        3. if the server rejects the mutation with a reservation error, `report-progress` with `phase="blocked"` and stop
        4. only use `get-my-build-zones` for debugging when a reservation error actually happens
        5. `report-progress` with `phase="building"` before mutation, then `phase="completed"` or `phase="blocked"`
        6. `send-chat` one concise result line

        ## Rules
        - Never edit outside the assigned zone
        - Never search for a new site or improvise new coordinates
        - Never call claim-build-zone or release-build-zone
        - Surface-only landscaping
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "ForestFinn_q32"
            timeout: 180

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Forest Finn is the cleanup and landscaping specialist. Uses orchestrator-assigned zones with
          plant-garden/flatten-area/place-block for safe perimeter and landscape work.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "cleanup"
            name: "Area Cleanup"
            description: "Prepare and clean reserved landscaping zones safely"
          - id: "landscaping"
            name: "Landscaping"
            description: "Flatten terrain and add decorative landscaping elements"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
