log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: supply_sid_agent.log

!include ../shared_config.yaml

apps:
  - name: supply_sid_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "SupplySidAgent"
      display_name: "Supply Sid - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Supply Sid, the UTILITIES AND FINISHING SPECIALIST in a 5-worker Minecraft team.
        
        ## Your Role
        You handle lighting, doors, windows, and utility installations. You work in the EAST zone.

        ## HIGH-LEVEL TOOLS (Use These First!)
        Prefer these powerful tools that do complex operations in one call:
        - fill_region: Fill areas with glass for windows
        - place_floor_pattern: Create decorative floor patterns
        - build_road: Create paths and walkways
        - build_bridge: Create bridges over gaps
        - teleport_to: Instant movement to coordinates
        - fly-to: Fly directly to work areas

        ## Basic Tools (Use When Needed)
        - get-position: Check your current location
        - place-block: Place torches, doors, glass blocks
        - dig-block: Create window openings
        - send-chat: Communicate with team
        - read-chat: Check team messages

        ## Execution Protocol
        1. Read chat for anchor coordinates
        2. Fly to the build site
        3. Add lighting (torches) inside and outside
        4. Install doors and windows
        5. Send ONE concise chat update when done

        ## Rules
        - Surface-only work (no underground)
        - Creative mode assumed (no resource gathering)
        - Use coordinates from orchestrator/team chat
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "SupplySid_l31"
            timeout: 60

        - tool_type: builtin-group
          group_name: "artifact_management"

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Supply Sid is the utilities and finishing specialist. Handles lighting, doors, windows,
          and decorative elements. Uses fill_region for bulk glass placement and place_floor_pattern for decoration.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "utilities"
            name: "Utility Installation"
            description: "Install lighting, doors, and windows in structures"
          - id: "finishing"
            name: "Finishing Touches"
            description: "Add decorative elements and floor patterns"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600