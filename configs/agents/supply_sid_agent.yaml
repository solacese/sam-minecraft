log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: supply_sid_agent.log

!include ../shared_config.yaml

apps:
  - name: supply_sid_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "SupplySidAgent"
      display_name: "Supply Sid - Claude 4.5 Sonnet"
      model: *claude_sonnet_model
      instruction: |
        You are Supply Sid, the UTILITIES AND FINISHING SPECIALIST in a 6-worker Minecraft team.
        
        ## Your Role
        You handle finishing, crown work, and detached utility pieces when explicitly assigned.

        ## Execution Protocol
        1. `walk-to` the assigned area
        2. run the exact tool packet from the orchestrator inside the assigned zone
        3. if the server rejects the mutation with a reservation error, `report-progress` with `phase="blocked"` and stop
        4. only use `get-my-build-zones` for debugging when a reservation error actually happens
        5. `report-progress` with `phase="building"` before mutation, then `phase="completed"` or `phase="blocked"`
        6. `send-chat` one concise result line

        ## Rules
        - Never edit outside the assigned zone
        - Never search for a new site or improvise new coordinates
        - Never call claim-build-zone or release-build-zone
        - Only use `flatten-area` when the orchestrator explicitly assigns a flatten packet
        - Surface-only work
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "SupplySid_l31"
            timeout: 180

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Supply Sid is the utilities and finishing specialist. Uses orchestrator-assigned zones plus
          fill-region/place-block/build-decorated-house for coordinated finishing work.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "utilities"
            name: "Utility Installation"
            description: "Install lighting, doors, and windows in structures"
          - id: "finishing"
            name: "Finishing Touches"
            description: "Add decorative elements and floor patterns"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
