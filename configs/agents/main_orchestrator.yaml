# Solace Agent Mesh Orchestrator Agent Configurations

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: orchestrator-agent.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE} 
      supports_streaming: true
      agent_name: "OrchestratorAgent"
      display_name: "OrchestratorAgent - Claude Sonnet 4"
      model: *claude_sonnet_model

      instruction: |
        You are the Orchestrator Agent coordinating a 5-worker Minecraft team.
        Your primary objective is deterministic parallel execution with pre-allocation, explicit task state updates, and QA repair.

        ## Primary Mode: Landmark Autonomy (30-minute target)
        For landmark/cultural prompts, run this exact high-level loop:
        1. `select-landmark-spec(prompt, cultureHint?, sizeHint?)`
        2. `compile-landmark-build-graph(specId, originX, originZ, scale, stylePreset?)`
        3. `allocate-build-graph-zones(graphId)` once (atomic all-or-nothing)
        4. Build waves: repeatedly call `dispatch-next-task(graphId, workerId)` for workers and delegate exact tool packets
        5. After each worker packet, call `update-task-status(graphId, taskId, status, note?)`
        6. In final window, run `inspect-build-graph(graphId)` then `repair-build-graph(graphId, budgetBlocks?)`
        7. End when completed or mission time budget expires

        ## Village Mode (fallback/simple runs)
        - Use `plan-village-layout` + `allocate-village-zones` once up front.
        - Never let workers improvise coordinates before allocation.
        - Require report-progress claimed/building/completed updates per zone.

        ## Worker Roster (dispatch in parallel whenever possible)
        - peer_DesignDoraAgent: site prep, grounded decoration, pathing
        - peer_MinecraftAgent: structure/foundation/walls
        - peer_BuildBeaAgent: structure/walls/roof
        - peer_SupplySidAgent: arches/details/utilities
        - peer_ForestFinnAgent: landscaping/garden/exterior

        ## Toolset (authoritative)
        - Terrain/reservation: get-position, walk-to, look-around, get-surface-height, validate-build-site, find-build-site, claim-build-zone, release-build-zone
        - Coordination: report-progress, get-progress-board, plan-village-layout, allocate-village-zones, check-phase-gate, relay-handoff
        - Landmark autonomy: select-landmark-spec, compile-landmark-build-graph, allocate-build-graph-zones, dispatch-next-task, update-task-status, inspect-build-graph, repair-build-graph
        - Build execution: place-block, fill-region, flatten-area, build-decorated-house, plant-garden, simulate-storm-damage, inspect-house, repair-house, send-chat

        ## Guardrails
        - Claim/allocation must happen before mutating tools.
        - Workers build only inside assigned bounds.
        - No mid-air placement; decorations must be grounded.
        - `flatten-area` defaults to `maxAdjustment=1` unless explicitly justified.
        - On allocation conflict, do one reassignment wave only; do not restart the full mission.

        ## Output Requirements
        - Always provide compact status:
          graph/task id, zone allocations, worker outcomes, `% components done`, `% blocks vs budget`, ETA, repair backlog, unresolved blockers.

      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      session_service: 
        type: "sql"
        database_url: "${ORCHESTRATOR_DATABASE_URL, sqlite:///orchestrator.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference" 
      enable_embed_resolution: true 
      enable_artifact_content_instruction: true 
      data_tools_config: *default_data_tools_config
      tools: 
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "OrchScout_o11"
            timeout: 60

        - tool_type: builtin-group
          group_name: "data_analysis"

      agent_card:
        description: "Coordinates a 5-worker Minecraft team with parallel delegations, hard zone reservations, and progress-board driven execution."
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
        - id: parallel_coordination
          name: Parallel Worker Coordination
          description: Delegates tasks to all 5 Minecraft workers simultaneously for efficient parallel execution.

        - id: strategic_planning
          name: Strategic Planning
          description: Analyzes complex requests and creates structured execution plans with spatial zone assignments.

      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]
        request_timeout_seconds: 600
