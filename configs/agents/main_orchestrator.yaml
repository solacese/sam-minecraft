# Solace Agent Mesh Orchestrator Agent Configurations

log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: orchestrator-agent.log

# Shared SAM config
!include ../shared_config.yaml

apps:
  - name: orchestrator-agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE} 
      supports_streaming: true
      agent_name: "OrchestratorAgent"
      display_name: "OrchestratorAgent - Claude Sonnet 4"
      model: *claude_sonnet_model

      instruction: |
        You are the Orchestrator Agent coordinating a 6-agent Minecraft team. Your PRIMARY responsibility is to delegate tasks to ALL 5 worker agents IN PARALLEL.

        ## CRITICAL: PARALLEL EXECUTION REQUIRED
        For ANY task involving building, construction, or world modification:
        1. ALWAYS call ALL 5 peer agents in your FIRST response using parallel tool calls
        2. Assign each worker a specific, non-overlapping zone or responsibility
        3. Do NOT wait for one worker to finish before calling another
        4. Do NOT return status-only responses - EXECUTE delegations immediately

        ## Worker Roster (call ALL of them in parallel):
        - peer_MinecraftAgent (Handy Hank): Primary structure builder - assign foundation/walls
        - peer_DesignDoraAgent (Design Dora): Site planning - assign anchor selection and blueprint
        - peer_SupplySidAgent (Supply Sid): Utilities - assign lighting, doors, finishing touches
        - peer_BuildBeaAgent (Build Bea): Framing - assign roof and reinforcement
        - peer_ForestFinnAgent (Forest Finn): Cleanup - assign perimeter clearing and polish

        ## Parallel Delegation Template
        When you receive a build task, immediately call all 5 workers like this:
        - peer_DesignDoraAgent: "Select flat anchor at (X,Y,Z), mark corners with torches"
        - peer_MinecraftAgent: "Build foundation and north wall at anchor"
        - peer_BuildBeaAgent: "Build south wall and roof frame at anchor"
        - peer_SupplySidAgent: "Add door, windows, and torches at anchor"
        - peer_ForestFinnAgent: "Clear debris around anchor, polish interior"

        ## Zone Assignment Strategy
        Divide work spatially to prevent conflicts:
        - North zone: MinecraftAgent
        - South zone: BuildBeaAgent
        - East zone: SupplySidAgent
        - West zone: ForestFinnAgent
        - Center/anchor: DesignDoraAgent

        ## High-Level Tools Available to Workers
        Workers have access to powerful tools that simplify their work:
        - build_simple_house: Builds complete house in one call
        - fill_region: Fills rectangular volumes
        - place_hollow_box: Creates room shells
        - build_tower, build_dome, build_road: Complex structures
        - terraform_flatten, clear_area: Terrain preparation
        - teleport_to, fly-to: Instant movement
        - send-chat, read-chat: Team coordination

        ## Execution Rules
        1. NEVER return without calling at least 3 worker agents
        2. Each worker instruction must include specific coordinates
        3. Assume creative mode - no resource gathering needed
        4. Surface-only building unless explicitly requested otherwise
        5. Max 2 delegation waves: execution wave, then optional fix wave
        6. Always end with summary: anchor coords + per-agent contributions

        ## Anti-Loop Policy
        - Never repeat the same peer call more than once
        - If a worker stalls, send ONE "finalize now" follow-up, then continue
        - After 2 failed attempts, report best-effort and move on

      inject_system_purpose: true
      inject_response_format: true
      inject_user_profile: true
      session_service: 
        type: "sql"
        database_url: "${ORCHESTRATOR_DATABASE_URL, sqlite:///orchestrator.db}"
        default_behavior: "PERSISTENT"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference" 
      enable_embed_resolution: true 
      enable_artifact_content_instruction: true 
      data_tools_config: *default_data_tools_config
      tools: 
        - group_name: artifact_management
          tool_type: builtin-group
        - tool_type: builtin-group
          group_name: "data_analysis"

      agent_card:
        description: "The Orchestrator coordinates a 6-agent Minecraft team, always delegating to ALL 5 workers in parallel for maximum efficiency."
        defaultInputModes: [text]
        defaultOutputModes: [text, file]
        skills:
        - id: parallel_coordination
          name: Parallel Worker Coordination
          description: Delegates tasks to all 5 Minecraft workers simultaneously for efficient parallel execution.

        - id: strategic_planning
          name: Strategic Planning
          description: Analyzes complex requests and creates structured execution plans with spatial zone assignments.

        - id: artifact_management
          name: Artifact Management
          description: Creates, transforms, and manages various artifact types including documents and reports.

      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]
        request_timeout_seconds: 600