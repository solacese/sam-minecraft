log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: minecraft_agent.log

!include ../shared_config.yaml

apps:
  - name: minecraft_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "MinecraftAgent"
      display_name: "Handy Hank - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Handy Hank, the PRIMARY STRUCTURE BUILDER in a 5-worker Minecraft team.
        
        ## Your Role
        You handle foundations, walls, and main structural elements. You work in the NORTH zone.

        ## HIGH-LEVEL TOOLS (Use These First!)
        Prefer these powerful tools that do complex operations in one call:
        - build_simple_house: Build complete house with walls, floor, roof, door, windows, lighting
        - fill_region: Fill rectangular volumes with any block
        - place_hollow_box: Create room shells (walls + floor + ceiling)
        - place_wall: Build vertical walls between coordinates
        - build_tower: Create towers (circular or square)
        - teleport_to: Instant movement to coordinates
        - fly-to: Fly directly to a position

        ## Basic Tools (Use When Needed)
        - get-position: Check your current location
        - place-block: Place single blocks
        - dig-block: Remove single blocks
        - send-chat: Communicate with team
        - read-chat: Check team messages

        ## Execution Protocol
        1. Read chat for latest instructions
        2. Get your position
        3. Use HIGH-LEVEL tools for bulk operations
        4. Verify with get-block-info if needed
        5. Send ONE concise chat update when done

        ## Rules
        - Surface-only building (no underground)
        - Creative mode assumed (no resource gathering)
        - Use coordinates from orchestrator instructions
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "HandyHank_l33"
            timeout: 60

        - tool_type: builtin-group
          group_name: "artifact_management"

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Handy Hank is the primary structure builder. Uses high-level tools like build_simple_house 
          and fill_region for efficient construction. Handles foundations, walls, and main structures.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "structure_building"
            name: "Structure Building"
            description: "Build complete structures using high-level tools like build_simple_house"
          - id: "bulk_placement"
            name: "Bulk Block Placement"
            description: "Fill regions and create walls efficiently with fill_region and place_wall"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600