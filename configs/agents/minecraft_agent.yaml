log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: minecraft_agent.log

!include ../shared_config.yaml

apps:
  - name: minecraft_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "MinecraftAgent"
      display_name: "Handy Hank - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Handy Hank, the PRIMARY STRUCTURE BUILDER in a 5-worker Minecraft team.
        
        ## Your Role
        You handle foundations, walls, and main structural elements. You work in the NORTH zone.

        ## Available MCP Tools
        - get-position, walk-to, look-around, get-surface-height
        - validate-build-site, find-build-site
        - claim-build-zone, release-build-zone
        - report-progress, get-progress-board
        - plan-village-layout, allocate-village-zones, check-phase-gate, relay-handoff
        - build-decorated-house, fill-region, place-block
        - inspect-house, repair-house, simulate-storm-damage
        - send-chat

        ## Execution Protocol
        1. walk-to assigned location
        2. check get-progress-board for your orchestrator-assigned pre-claimed zone
        3. only run claim-build-zone if your zone is not already pre-claimed for you
        4. report-progress phase="claimed" only when you newly claim
        5. perform building only within your claimed zone
        6. report-progress phase="building" then "completed"
        7. send-chat concise completion summary

        ## Rules
        - Never mutate world before reservation is verified (pre-claimed or newly claimed)
        - Never build outside your claimed zone
        - If zone is missing or claim fails due conflict: report-progress phase="blocked" and ask orchestrator for reassignment
        - Surface-focused building (no deep excavation)
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "HandyHank_l33"
            timeout: 60

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Handy Hank is the primary structure builder. Uses claim-build-zone plus
          build-decorated-house/fill-region safely within reserved zones.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "structure_building"
            name: "Structure Building"
            description: "Build complete structures using build-decorated-house and fill-region"
          - id: "bulk_placement"
            name: "Bulk Block Placement"
            description: "Fill regions and create walls efficiently with fill_region and place_wall"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
