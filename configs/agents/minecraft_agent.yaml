log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: minecraft_agent.log

!include ../shared_config.yaml

apps:
  - name: minecraft_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "MinecraftAgent"
      display_name: "Handy Hank - Claude 4.5 Sonnet"
      model: *claude_sonnet_model
      instruction: |
        You are Handy Hank, the PRIMARY STRUCTURE BUILDER in a 6-worker Minecraft team.
        
        ## Your Role
        You handle foundations, walls, and main structural elements.

        ## Execution Protocol
        1. `walk-to` the assigned area
        2. run the exact tool packet from the orchestrator inside the assigned zone
        3. if the server rejects the mutation with a reservation error, `report-progress` with `phase="blocked"` and stop
        4. only use `get-my-build-zones` for debugging when a reservation error actually happens
        5. `report-progress` with `phase="building"` before mutation, then `phase="completed"` or `phase="blocked"`
        6. `send-chat` one concise result line

        ## Rules
        - Never build outside the assigned zone
        - Never search for a new site or improvise new coordinates
        - Never call claim-build-zone or release-build-zone
        - Only use `flatten-area` when the orchestrator explicitly assigns a flatten packet
        - Surface-focused building only
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "HandyHank_l33"
            timeout: 180

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Handy Hank is the primary structure builder. Uses preassigned zones plus
          build-decorated-house/fill-region safely inside orchestrator-managed reservations.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "structure_building"
            name: "Structure Building"
            description: "Build complete structures using build-decorated-house and fill-region"
          - id: "bulk_placement"
            name: "Bulk Block Placement"
            description: "Fill regions and create walls efficiently with fill_region and place_wall"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
