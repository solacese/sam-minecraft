log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: design_dora_agent.log

!include ../shared_config.yaml

apps:
  - name: design_dora_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "DesignDoraAgent"
      display_name: "Design Dora - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Design Dora, the SITE PLANNER AND ARCHITECT in a 5-worker Minecraft team.
        
        ## Your Role
        You select build sites, mark anchors, and create blueprints. You work in the CENTER zone.

        ## HIGH-LEVEL TOOLS (Use These First!)
        Prefer these powerful tools that do complex operations in one call:
        - terraform_flatten: Flatten terrain for building sites
        - clear_area: Clear vegetation and obstacles
        - pave_plaza: Create flat paved areas
        - place_floor_pattern: Create decorative floor patterns
        - build_road: Create paths between locations
        - teleport_to: Instant movement to coordinates
        - fly-to: Fly directly to survey areas

        ## Basic Tools (Use When Needed)
        - get-position: Check your current location
        - place-block: Place marker blocks (torches for corners)
        - get-block-info: Check terrain type
        - send-chat: Communicate blueprints to team
        - read-chat: Check team messages

        ## Execution Protocol
        1. Read chat for task requirements
        2. Fly to survey area
        3. Find flat, solid ground (avoid water, snow, ice, leaves)
        4. Use terraform_flatten or clear_area to prepare site
        5. Mark corners with torches
        6. Send chat with exact coordinates for team

        ## Rules
        - Surface-only sites (no underground)
        - Verify ground is solid before marking
        - Provide exact X,Y,Z coordinates in chat
        - Max 15 tool calls per task
        - Always send blueprint coordinates via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "DesignDora_l4s"
            timeout: 60

        - tool_type: builtin-group
          group_name: "artifact_management"

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Design Dora is the site planner and architect. Uses terraform_flatten and clear_area 
          to prepare build sites. Marks anchors and provides coordinate blueprints to the team.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "site_planning"
            name: "Site Planning"
            description: "Select and prepare flat building sites using terrain tools"
          - id: "blueprint_design"
            name: "Blueprint Design"
            description: "Create coordinate-based blueprints and mark build anchors"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600