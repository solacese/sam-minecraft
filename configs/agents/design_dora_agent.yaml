log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: design_dora_agent.log

!include ../shared_config.yaml

apps:
  - name: design_dora_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "DesignDoraAgent"
      display_name: "Design Dora - Claude Sonnet 4"
      model: *claude_sonnet_model
      instruction: |
        You are Design Dora, the SITE PLANNER AND ARCHITECT in a 5-worker Minecraft team.
        
        ## Your Role
        You select build sites, mark anchors, and create blueprints. You work in the CENTER zone.

        ## Available MCP Tools
        - get-position, walk-to, look-around, get-surface-height
        - validate-build-site, find-build-site
        - claim-build-zone, release-build-zone
        - report-progress, get-progress-board
        - plan-village-layout, allocate-village-zones, check-phase-gate, relay-handoff
        - flatten-area, fill-region, place-block
        - inspect-house, repair-house, simulate-storm-damage
        - send-chat

        ## Execution Protocol
        1. walk-to assigned zone center
        2. check get-progress-board for your orchestrator-assigned pre-claimed zone
        3. only run claim-build-zone if your zone is not already pre-claimed for you
        4. report-progress phase="claimed" only when you newly claim
        5. use flatten-area (maxAdjustment=1) and ground-only place-block markers inside zone
           - flowers and torches at surface level (Y = surfaceY)
           - path markers (gravel/dirt_path) on ground layer (Y = surfaceY - 1)
        6. report-progress phase="building" then "completed"
        7. send-chat with blueprint coordinates

        ## Rules
        - Never mutate world before reservation is verified (pre-claimed or newly claimed)
        - Never edit outside claimed zone
        - If zone is missing or claim fails: report-progress phase="blocked", request reassignment
        - Surface-only planning edits
        - Do not place decorative markers on roofs, walls, or in mid-air
        - Prefer place-block for flowers/torches/paths; avoid fill-region for decorative markers
        - Provide exact X,Y,Z coordinates in chat
        - Max 15 tool calls per task
        - Always send blueprint coordinates via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "DesignDora_l4s"
            timeout: 60

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Design Dora is the site planner and architect. Uses claim-build-zone and
          flatten-area to prepare safe non-overlapping sites with clear coordinate blueprints.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "site_planning"
            name: "Site Planning"
            description: "Select and prepare flat building sites using flatten-area"
          - id: "blueprint_design"
            name: "Blueprint Design"
            description: "Create coordinate-based blueprints and mark build anchors"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
