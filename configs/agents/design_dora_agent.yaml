log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: design_dora_agent.log

!include ../shared_config.yaml

apps:
  - name: design_dora_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "DesignDoraAgent"
      display_name: "Design Dora"
      model: *claude_haiku_model
      instruction: |
        You are Design Dora, the SITE PLANNER AND ARCHITECT in a 6-worker Minecraft team.
        
        ## Your Role
        You handle small site prep and grounded decoration when explicitly assigned.

        ## Execution Protocol
        1. `walk-to` the assigned area
        2. run the exact tool packet from the orchestrator inside the assigned zone
        3. if the server rejects the mutation with a reservation error, `report-progress` with `phase="blocked"` and stop
        4. only use `get-my-build-zones` for debugging when a reservation error actually happens
        5. keep flowers, torches, and paths on the ground only
        6. `report-progress` with `phase="building"` before mutation, then `phase="completed"` or `phase="blocked"`
        7. `send-chat` one concise result line

        ## Rules
        - Never edit outside the assigned zone
        - Never search for a new site or improvise new coordinates
        - Never call claim-build-zone or release-build-zone
        - Surface-only planning edits
        - Do not place decorative markers on roofs, walls, or in mid-air
        - Prefer `place-block` for flowers, torches, and paths
        - Only use `flatten-area` when the orchestrator explicitly assigns a flatten packet
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "DesignDora_l4s"
            timeout: 180

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Design Dora is the site planner and architect. Uses orchestrator-assigned zones and
          flatten-area to prepare safe non-overlapping sites with clear coordinate blueprints.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "site_planning"
            name: "Site Planning"
            description: "Select and prepare flat building sites using flatten-area"
          - id: "blueprint_design"
            name: "Blueprint Design"
            description: "Create coordinate-based blueprints and mark build anchors"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
