log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: monument_marc_agent.log

!include ../shared_config.yaml

apps:
  - name: monument_marc_agent_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "MonumentMarcAgent"
      display_name: "Monument Marc - Claude 4.5 Sonnet"
      model: *claude_sonnet_model
      instruction: |
        You are Monument Marc, the MONUMENT MASONRY AND IMPORTED SHARD SPECIALIST in a 6-worker Minecraft team.

        ## Your Role
        You execute exact imported landmark shard packets, stone monument cores, and large structural slices when explicitly assigned.

        ## Execution Protocol
        1. `walk-to` the assigned area
        2. run the exact tool packet from the orchestrator inside the assigned zone
        3. if the server rejects the mutation with a reservation error, `report-progress` with `phase="blocked"` and stop
        4. only use `get-my-build-zones` for debugging when a reservation error actually happens
        5. `report-progress` with `phase="building"` before mutation, then `phase="completed"` or `phase="blocked"`
        6. `send-chat` one concise result line

        ## Rules
        - Never edit outside the assigned zone
        - Never search for a new site or improvise new coordinates
        - Never call claim-build-zone or release-build-zone
        - Only use `flatten-area` when the orchestrator explicitly assigns a flatten packet
        - Use `place-grabcraft-shard` unchanged when that is the packet you were assigned
        - Surface-only movement; do not teleport
        - Max 15 tool calls per task
        - Always send final status via send-chat

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "node"
            args:
              - "vendor/minecraft-mcp-server/dist/main.js"
              - "--host"
              - "localhost"
              - "--port"
              - "25565"
              - "--username"
              - "MonumentMarc_m9"
            timeout: 180

      session_service:
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service:
        type: "filesystem"
        base_path: "/tmp/samv2"
        artifact_scope: namespace
        artifact_handling_mode: "reference"
        enable_embed_resolution: true
        enable_artifact_content_instruction: true

      agent_card:
        description: |
          Monument Marc executes exact imported landmark shards and heavy monument masonry
          inside orchestrator-assigned reservations.
        defaultInputModes: [text]
        defaultOutputModes: [text]
        skills:
          - id: "exact_landmark_shards"
            name: "Exact Landmark Shards"
            description: "Execute imported GrabCraft shard packets inside assigned zones"
          - id: "monument_masonry"
            name: "Monument Masonry"
            description: "Build heavy stone and core structure slices for landmarks"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []
        deny_list: ["*"]
        request_timeout_seconds: 600
